        }

        .logo i {

        }

        .logo h2 {

            font-weight: 700;
            color: #fff;

        .logo span {

        }

        }

            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-btn:hover {
            background: #f97316;
            color: #000;
        }

        .profile-btn {
            background: #f97316;
            border: none;
            color: #000;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .profile-btn img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        .auth-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .auth-modal.active {
            display: flex;
        }

        .auth-container {
            background: #1a1a1a;

            padding: 30px;
            border: 1px solid #f97316;
            position: relative;
        }

            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 20px;
            color: #ef4444;

        }

            margin-bottom: 25px;
            border-bottom: 1px solid #333;

        .auth-tab {

            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-tab.active {
            color: #f97316;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 40px;
            color: #fff;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #f97316;
        }

        .auth-submit {
            width: 100%;
            padding: 12px;
            background: #f97316;
            border: none;
            border-radius: 40px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 15px 0;
        }

        .divider {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin: 15px 0;
            position: relative;
        }

        .google-signin {
            display: flex;
            justify-content: center;
        }

        .main-content {
            padding: 20px 25px;

            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
            font-size: 16px;
            font-weight: 500;

        }

        .tab.active {
            color: #f97316;
            border-bottom: 2px solid #f97316;
        }

            position: relative;
            max-width: 500px;
            margin-bottom: 25px;
        }

            position: absolute;
            left: 15px;
            top: 50%;

            font-size: 16px;
        }

            border: 1px solid #333;
            border-radius: 40px;
            color: #fff;
            font-size: 15px;

            border-color: #f97316;
        }

            color: #888;
            font-size: 14px;
        }

        .stats i {
            color: #f97316;
            margin-right: 5px;
        }

        .grid {
            display: grid;

            gap: 18px;
        }

        .card {

            border-radius: 20px;
            border: 1px solid #2a2a2a;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .card:hover {
            border-color: #f97316;
            transform: translateY(-3px);
        }

        .card-header {
            height: 100px;
            background: #1f1f1f;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .card-header i {
            font-size: 40px;
            color: #f97316;
        }

        .card-header.emergency {
            background: #2d1a1a;
        }

        .card-header.emergency i {
            color: #ef4444;
        }

        .emergency-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .card-content {
            padding: 15px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        .card-category {
            font-size: 12px;
            color: #f97316;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .card-desc {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

                { id: 40, name: "Cetirizine", category: "Antihistamine", usage: "Allergies, hives", action: "H1 receptor antagonist", dosage: "5-10mg once daily", warnings: "May cause drowsiness", icon: "fa-pills" },
                { id: 41, name: "Fexofenadine", category: "Antihistamine", usage: "Seasonal allergies", action: "Blocks peripheral H1 receptors", dosage: "180mg once daily", warnings: "Non-sedating", icon: "fa-capsules" },
                { id: 42, name: "Diphenhydramine", category: "Antihistamine", usage: "Allergies, insomnia", action: "First-gen H1 blocker", dosage: "25-50mg every 6h", warnings: "Causes drowsiness", icon: "fa-tablets" },

                // Respiratory
                { id: 43, name: "Albuterol", category: "Bronchodilator", usage: "Asthma, COPD", action: "Beta-2 agonist", dosage: "2 puffs every 4-6h as needed", warnings: "Don't exceed 12 puffs/day", icon: "fa-pump-medical" },
                { id: 44, name: "Fluticasone", category: "Corticosteroid", usage: "Asthma, allergies", action: "Reduces inflammation", dosage: "1-2 puffs twice daily", warnings: "Rinse mouth after use", icon: "fa-pump-medical" },
                { id: 45, name: "Mucinex", category: "Expectorant", usage: "Chest congestion", action: "Thins mucus", dosage: "600-1200mg every 12h", warnings: "Drink plenty water", icon: "fa-tablets" },
                { id: 46, name: "Dextromethorphan", category: "Cough Suppressant", usage: "Dry cough", action: "Affects cough center in brain", dosage: "10-20mg every 4h", warnings: "Don't exceed 120mg/day", icon: "fa-capsules" },

                // Mental Health
                { id: 47, name: "Sertraline", category: "SSRI", usage: "Depression, anxiety, OCD", action: "Inhibits serotonin reuptake", dosage: "50-200mg once daily", warnings: "May take 4-6 weeks", icon: "fa-pills" },
                { id: 48, name: "Escitalopram", category: "SSRI", usage: "Depression, anxiety", action: "Selective serotonin reuptake inhibition", dosage: "10-20mg once daily", warnings: "Less drug interactions", icon: "fa-tablets" },
                { id: 49, name: "Fluoxetine", category: "SSRI", usage: "Depression, bulimia", action: "Increases serotonin", dosage: "20-80mg daily", warnings: "Long half-life", icon: "fa-capsules" },
                { id: 50, name: "Alprazolam", category: "Benzodiazepine", usage: "Anxiety, panic", action: "Enhances GABA effects", dosage: "0.25-0.5mg three times", warnings: "Risk of dependence", icon: "fa-pills" },
                { id: 51, name: "Lorazepam", category: "Benzodiazepine", usage: "Anxiety, insomnia", action: "GABA receptor agonist", dosage: "1-2mg as needed", warnings: "Short-term use only", icon: "fa-tablets" },
                { id: 52, name: "Zolpidem", category: "Sedative", usage: "Insomnia", action: "Selective GABA agonist", dosage: "5-10mg at bedtime", warnings: "Don't combine with alcohol", icon: "fa-capsules" },

                // Blood Thinners
                { id: 53, name: "Warfarin", category: "Anticoagulant", usage: "Blood clots, stroke prevention", action: "Inhibits vitamin K dependent factors", dosage: "Adjusted by INR", warnings: "Regular monitoring needed", icon: "fa-tablets" },
                { id: 54, name: "Apixaban", category: "DOAC", usage: "Atrial fibrillation, DVT", action: "Factor Xa inhibitor", dosage: "5mg twice daily", warnings: "No monitoring needed", icon: "fa-pills" },
                { id: 55, name: "Rivaroxaban", category: "DOAC", usage: "DVT, PE prevention", action: "Factor Xa inhibitor", dosage: "20mg once daily", warnings: "Take with food", icon: "fa-capsules" },
                { id: 56, name: "Clopidogrel", category: "Antiplatelet", usage: "Heart attack, stroke prevention", action: "P2Y12 inhibitor", dosage: "75mg once daily", warnings: "Genetic variability", icon: "fa-tablets" },

                // Thyroid
                { id: 57, name: "Levothyroxine", category: "Thyroid Hormone", usage: "Hypothyroidism", action: "Replaces T4 hormone", dosage: "25-200mcg daily", warnings: "Take on empty stomach", icon: "fa-pills" },
                { id: 58, name: "Methimazole", category: "Antithyroid", usage: "Hyperthyroidism", action: "Inhibits thyroid peroxidase", dosage: "5-20mg daily", warnings: "Monitor blood counts", icon: "fa-tablets" },

                // Osteoporosis
                { id: 59, name: "Alendronate", category: "Bisphosphonate", usage: "Osteoporosis", action: "Inhibits bone resorption", dosage: "70mg once weekly", warnings: "Take with full water", icon: "fa-tablets" },
                { id: 60, name: "Calcium", category: "Supplement", usage: "Bone health", action: "Essential for bones", dosage: "1000-1200mg daily", warnings: "Divide doses", icon: "fa-capsules" },

                // ADD MORE (total 100+ medicines)
            ].concat([
                // Generating 40 more medicines to reach 100+
                ...[...Array(40)].map((_, i) => ({
                    id: 61 + i,
                    name: ["Gabapentin", "Pregabalin", "Tramadol", "Morphine", "Oxycodone", "Methadone", "Buprenorphine", "Naloxone", "Naltrexone", "Bupropion", "Venlafaxine", "Duloxetine", "Mirtazapine", "Trazodone", "Quetiapine", "Olanzapine", "Risperidone", "Aripiprazole", "Haloperidol", "Lithium", "Valproate", "Lamotrigine", "Topiramate", "Levetiracetam", "Phenytoin", "Carbamazepine", "Oxcarbazepine", "Clonazepam", "Diazepam", "Baclofen", "Tizanidine", "Cyclobenzaprine", "Methocarbamol", "Carisoprodol", "Orphenadrine", "Dantrolene", "Botulinum toxin", "Donepezil", "Memantine", "Rivastigmine"][i],
                    category: ["Neurology", "Pain", "Psychiatry", "Muscle Relaxant", "Alzheimer's"][i % 5],
                    usage: "Various therapeutic indications",
                    action: "Multiple mechanisms of action",
                    dosage: "Individualized dosing",
                    warnings: "Consult healthcare provider",
                    icon: "fa-pills"
                }))
            ]),

            firstAid: [
                { id: 1001, name: "Severe Bleeding", category: "Emergency", steps: ["Apply direct pressure with clean cloth", "Elevate injured area above heart", "Call emergency services", "Keep pressure until help arrives"], warning: "If bleeding doesn't stop after 10 minutes, seek immediate help", icon: "fa-droplet" },
                { id: 1002, name: "Choking", category: "Emergency", steps: ["Stand behind person", "Make fist above navel", "Grasp fist and thrust inward/upward", "Repeat 5 times", "Start CPR if unconscious"], warning: "Call emergency if person becomes unconscious", icon: "fa-lungs" },
                { id: 1003, name: "Burns", category: "Injury", steps: ["Cool with cool water 20 minutes", "Cover with sterile non-stick bandage", "Don't use ice", "Don't pop blisters"], warning: "Seek emergency for severe/large burns", icon: "fa-fire" },
                { id: 1004, name: "Heart Attack", category: "Emergency", steps: ["Call emergency immediately", "Have person sit and rest", "Chew aspirin if available", "Loosen tight clothing"], warning: "Every minute counts - call immediately", icon: "fa-heart" },
                { id: 1005, name: "Stroke", category: "Emergency", steps: ["FAST: Face drooping", "Arm weakness", "Speech difficulty", "Time to call emergency"], warning: "Note when symptoms started", icon: "fa-brain" }
            ]
        };

        // ==================== AUTHENTICATION SYSTEM ====================
        let currentUser = null;

        const showLoginBtn = document.getElementById('showLoginBtn');
        const authModal = document.getElementById('authModal');
        const closeAuth = document.getElementById('closeAuth');
        const profileBtn = document.getElementById('profileBtn');
        const profileImage = document.getElementById('profileImage');
        const profileName = document.getElementById('profileName');

        showLoginBtn.addEventListener('click', () => authModal.classList.add('active'));
        closeAuth.addEventListener('click', () => authModal.classList.remove('active'));

        // Tab switching
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
            });
        });

        // Google Sign-In
        window.onload = function() {
            google.accounts.id.initialize({
                client_id: "295699302802-t4l7rov5vo93g20fuphhbh4sj21dbgu1.apps.googleusercontent.com",
                callback: handleGoogleSignIn
            });
            google.accounts.id.renderButton(
                document.getElementById('googleSignInDiv'),
                { theme: 'filled_black', size: 'large', text: 'signin_with', shape: 'pill' }
            );
        };

        function handleGoogleSignIn(response) {
            const data = parseJwt(response.credential);
            loginUser({
                name: data.name,
                email: data.email,
                picture: data.picture
            });
        }

        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(atob(base64));
        }

        // Manual login
        document.getElementById('manualLoginBtn').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value;
            if (email) {
                loginUser({
                    name: email.split('@')[0],
                    email: email,
                    picture: 'https://ui-avatars.com/api/?name=' + email.split('@')[0] + '&background=f97316&color=fff'
                });
            }
        });

        document.getElementById('manualRegisterBtn').addEventListener('click', () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            if (name && email) {
                loginUser({
                    name: name,
                    email: email,
                    picture: 'https://ui-avatars.com/api/?name=' + name + '&background=f97316&color=fff'
                });
            }
        });

        function loginUser(user) {
            currentUser = user;
            showLoginBtn.style.display = 'none';
            profileBtn.style.display = 'flex';
            profileImage.src = user.picture;
            profileName.textContent = user.name;
            authModal.classList.remove('active');
            localStorage.setItem('currentUser', JSON.stringify(user));
        }

        // Check saved user
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            loginUser(JSON.parse(savedUser));
        }

        // Logout
        profileBtn.addEventListener('click', () => {
            if (confirm('Logout?')) {
                currentUser = null;
                localStorage.removeItem('currentUser');
                showLoginBtn.style.display = 'flex';
                profileBtn.style.display = 'none';
            }
        });

        // ==================== DISPLAY SYSTEM ====================
        let currentTab = 'medicines';
        const cardsGrid = document.getElementById('cardsGrid');
        const searchInput = document.getElementById('searchInput');
        const detailModal = document.getElementById('detailModal');
        const detailContent = document.getElementById('detailContent');
        const closeDetail = document.getElementById('closeDetail');

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                searchInput.value = '';
                displayCards();
            });
        });

        function displayCards(filter = '') {
            cardsGrid.innerHTML = '';
            let items = currentTab === 'medicines' ? database.medicines : database.firstAid;
            
            const filtered = items.filter(item => 
                item.name.toLowerCase().includes(filter.toLowerCase()) || 
                item.category.toLowerCase().includes(filter.toLowerCase())
            );

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const isEmergency = currentTab === 'firstAid';
                const desc = currentTab === 'medicines' ? item.usage : item.steps[0];
                
                card.innerHTML = `
                    <div class="card-header ${isEmergency ? 'emergency' : ''}">
                        <i class="fas ${item.icon}"></i>
                        ${isEmergency ? '<span class="emergency-badge"><i class="fas fa-exclamation"></i> URGENT</span>' : ''}
                    </div>
                    <div class="card-content">
                        <div class="card-title">${item.name}</div>
                        <div class="card-category">${item.category}</div>
                        <div class="card-desc">${desc}</div>
                    </div>
                `;
                
                card.addEventListener('click', () => showDetails(item));
                cardsGrid.appendChild(card);
            });
        }

        function showDetails(item) {
            let html = `
                <div class="detail-icon"><i class="fas ${item.icon}"></i></div>
                <div class="detail-name">${item.name}</div>
                <div class="detail-category">${item.category}</div>
            `;

            if (currentTab === 'medicines') {
                html += `
                    <div class="detail-section">
                        <h4><i class="fas fa-info-circle"></i> Uses</h4>
                        <p>${item.usage}</p>
                    </div>
                    <div class="detail-section">
                        <h4><i class="fas fa-flask"></i> Mechanism</h4>
                        <p>${item.action}</p>
                    </div>
                    <div class="detail-section">
                        <h4><i class="fas fa-clock"></i> Dosage</h4>
                        <p>${item.dosage}</p>
                    </div>
                    <div class="warning-box">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p><strong>⚠️ Warning:</strong> ${item.warnings}</p>
                    </div>
                `;
            } else {
                html += `
                    <div class="detail-section">
                        <h4><i class="fas fa-list-ol"></i> Steps</h4>
                        <ul>
                            ${item.steps.map(step => `<li>${step}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="warning-box">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p><strong>⚠️ Important:</strong> ${item.warning}</p>
                    </div>
                `;
            }

            detailContent.innerHTML = html;
            detailModal.classList.add('active');
        }

        closeDetail.addEventListener('click', () => detailModal.classList.remove('active'));
        detailModal.addEventListener('click', (e) => {
            if (e.target === detailModal) detailModal.classList.remove('active');
        });

        searchInput.addEventListener('input', (e) => displayCards(e.target.value));

        // Initial display
        displayCards();
    </script>
</body>
</html>
