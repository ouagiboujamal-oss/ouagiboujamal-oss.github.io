                { id: 2008, name: "المثانة (Bladder)", system: "Urinary", description: "تخزين البول", function: "تخزين البول حتى التبول", fact: "تحتوي 400-600 مل", icon: "fa-circle", pos: { top: '70%', left: '48%' } } // أيقونة بديلة
            ]
        };

        // ==================== AUTH SYSTEM ====================
        let currentUser = null;

        const showLoginBtn = document.getElementById('showLoginBtn');
        const authModal = document.getElementById('authModal');
        const closeAuth = document.getElementById('closeAuth');
        const profileBtn = document.getElementById('profileBtn');
        const profileImage = document.getElementById('profileImage');
        const profileName = document.getElementById('profileName');

        showLoginBtn.addEventListener('click', () => authModal.classList.add('active'));
        closeAuth.addEventListener('click', () => authModal.classList.remove('active'));
        window.addEventListener('click', (e) => { if (e.target === authModal) authModal.classList.remove('active'); });

        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
            });
        });

        document.getElementById('manualLoginBtn').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value;
            if (email) {
                loginUser({
                    name: email.split('@')[0],
                    email: email,
                    picture: 'https://ui-avatars.com/api/?name=' + email.split('@')[0] + '&background=f97316&color=fff'
                });
            } else alert('Please enter email');
        });

        document.getElementById('manualRegisterBtn').addEventListener('click', () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            if (name && email) {
                loginUser({
                    name: name,
                    email: email,
                    picture: 'https://ui-avatars.com/api/?name=' + name + '&background=f97316&color=fff'
                });
            } else alert('Please fill all fields');
        });

        function loginUser(user) {
            currentUser = user;
            showLoginBtn.style.display = 'none';
            profileBtn.style.display = 'flex';
            profileImage.src = user.picture;
            // عرض اسم المستخدم بشكل مزين ومائل
            profileName.innerHTML = `👋 <span style="font-style: italic; font-weight: 800; background: linear-gradient(45deg, #fff, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">${user.name.split(' ')[0]}</span>`;
            authModal.classList.remove('active');
            localStorage.setItem('currentUser', JSON.stringify(user));
        }

        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) { try { loginUser(JSON.parse(savedUser)); } catch { localStorage.removeItem('currentUser'); } }

        profileBtn.addEventListener('click', () => {
            if (confirm('Logout?')) {
                currentUser = null;
                localStorage.removeItem('currentUser');
                showLoginBtn.style.display = 'flex';
                profileBtn.style.display = 'none';
            }
        });

        // Google Sign-In
        function handleGoogleSignIn(response) {
            try {
                const base64Url = response.credential.split('.')[1];
                const userData = JSON.parse(atob(base64Url));
                loginUser({
                    name: userData.name || 'User',
                    email: userData.email,
                    picture: userData.picture || 'https://ui-avatars.com/api/?name=' + (userData.name || 'User')
                });
            } catch { alert('Google sign-in failed'); }
        }

        window.onload = function() {
            try {
                google.accounts.id.initialize({ client_id: "295699802302-q6mn9sldoki97gn2bai3sv54jjmiuf95.apps.googleusercontent.com", callback: handleGoogleSignIn });
                google.accounts.id.renderButton(document.getElementById('googleSignInDiv'), { theme: 'outline', size: 'large', width: '100%' });
            } catch (e) { console.log('Google init error'); }
            displayCards();
        };

        // ==================== DISPLAY SYSTEM ====================
        let currentTab = 'medicines';
        const cardsGrid = document.getElementById('cardsGrid');
        const searchInput = document.getElementById('searchInput');
        const searchBox = document.getElementById('searchBox');
        const anatomyContainer = document.getElementById('anatomyContainer');
        const detailModal = document.getElementById('detailModal');
        const detailContent = document.getElementById('detailContent');
        const closeDetail = document.getElementById('closeDetail');

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                searchInput.value = '';
                
                if (currentTab === 'anatomy') {
                    cardsGrid.style.display = 'none';
                    searchBox.style.display = 'none';
                    anatomyContainer.style.display = 'block';
                    renderAnatomy();
                } else {
                    cardsGrid.style.display = 'grid';
                    searchBox.style.display = 'block';
                    anatomyContainer.style.display = 'none';
                    displayCards();
                }
            });
        });

        function renderAnatomy() {
            // استخدام صورة تشريح حقيقية (رابط صورة تعليمية)
            let html = `
                <div class="anatomy-container">
                    <div class="anatomy-image-wrapper">
                        <img src="https://img.freepik.com/free-vector/human-anatomy-chart_1048-1633.jpg?t=st=1741194498~exp=1741198098~hmac=9d8a6c5b5d5e9a5f5d5e9a5f5d5e9a5f5d5e9a5f5d5e9a5f5d5e9a5f5d5e9a5f5d" alt="Human Anatomy" class="anatomy-image" onerror="this.src='https://via.placeholder.com/600x400?text=Human+Anatomy+Chart'">
            `;
            
            // إضافة النقاط التفاعلية على الأعضاء
            database.anatomy.forEach(organ => {
                html += `<div class="organ-dot" style="top: ${organ.pos.top}; left: ${organ.pos.left};" data-organ="${organ.id}"></div>`;
                html += `<div class="organ-label" style="top: ${parseInt(organ.pos.top) + 3}%; left: ${organ.pos.left};">${organ.name.split(' ')[0]}</div>`;
            });
            
            html += `</div><div class="organs-grid" id="organsGrid">`;
            
            database.anatomy.forEach(organ => {
                html += `<div class="organ-card" data-id="${organ.id}">
                    <i class="fas ${organ.icon}"></i>
                    <span>${organ.name}</span>
                </div>`;
            });
            
            html += `</div></div>`;
            anatomyContainer.innerHTML = html;

            // إضافة event listeners
            document.querySelectorAll('.organ-dot, .organ-card').forEach(el => {
                el.addEventListener('click', (e) => {
                    const id = el.dataset.organ || el.dataset.id;
                    const organ = database.anatomy.find(o => o.id == id);
                    if (organ) showAnatomyDetails(organ);
                });
            });
        }

        function showAnatomyDetails(organ) {
            detailContent.innerHTML = `
                <div class="detail-icon"><i class="fas ${organ.icon}"></i></div>
                <div class="detail-name">${organ.name}</div>
                <div class="detail-category">${organ.system}</div>
                <div class="detail-section"><h4>📖 الوصف</h4><p>${organ.description}</p></div>
                <div class="detail-section"><h4>⚙️ الوظيفة</h4><p>${organ.function}</p></div>
                <div class="warning-box"><i class="fas fa-lightbulb"></i><p>💡 ${organ.fact}</p></div>
            `;
            detailModal.classList.add('active');
        }

        function displayCards(filter = '') {
            cardsGrid.innerHTML = '';
            let items = currentTab === 'medicines' ? database.medicines : database.firstAid;
            
            const filtered = items.filter(item => 
                item.name.toLowerCase().includes(filter.toLowerCase()) || 
                item.category.toLowerCase().includes(filter.toLowerCase())
            );

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                const isEmergency = currentTab === 'firstaid';
                
                card.innerHTML = `
                    <div class="card-header ${isEmergency ? 'emergency' : ''}">
                        <i class="fas ${item.icon}"></i>
                        ${isEmergency ? '<span class="emergency-badge">⚠️ URGENT</span>' : ''}
                    </div>
                    <div class="card-content">
                        <div class="card-title">${item.name}</div>
                        <div class="card-category">${item.category}</div>
                        <div class="card-desc">${item.usage || item.steps[0]}</div>
                    </div>
                `;
                
                card.addEventListener('click', () => showDetails(item));
                cardsGrid.appendChild(card);
            });
        }

        function showDetails(item) {
            let html = `<div class="detail-icon"><i class="fas ${item.icon}"></i></div>
                        <div class="detail-name">${item.name}</div>
                        <div class="detail-category">${item.category}</div>`;

            if (currentTab === 'medicines') {
                html += `<div class="detail-section"><h4>💊 الاستخدام</h4><p>${item.usage}</p></div>
                         <div class="detail-section"><h4>⚙️ آلية العمل</h4><p>${item.action}</p></div>
                         <div class="detail-section"><h4>⏰ الجرعة</h4><p>${item.dosage}</p></div>
                         <div class="warning-box"><i class="fas fa-exclamation-triangle"></i><p>⚠️ ${item.warnings}</p></div>`;
            } else {
                html += `<div class="detail-section"><h4>📋 الخطوات</h4><ul>${item.steps.map(s => `<li>${s}</li>`).join('')}</ul></div>
                         <div class="warning-box"><i class="fas fa-exclamation-triangle"></i><p>⚠️ ${item.warning}</p></div>`;
            }

            detailContent.innerHTML = html;
            detailModal.classList.add('active');
        }

        closeDetail.addEventListener('click', () => detailModal.classList.remove('active'));
        detailModal.addEventListener('click', (e) => { if (e.target === detailModal) detailModal.classList.remove('active'); });
        searchInput.addEventListener('input', (e) => displayCards(e.target.value));
    </script>
</body>
</html>
