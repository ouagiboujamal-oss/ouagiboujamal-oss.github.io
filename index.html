            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
        }

        .navbar {
            background: #111111;
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f97316;
            position: sticky;
            top: 0;

        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 28px;
            color: #f97316;
        }

        .logo h2 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #f97316;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .login-btn {
            background: transparent;
            border: 1.5px solid #f97316;
            color: #f97316;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-btn:hover {
            background: #f97316;
            color: #000;
        }

        .profile-btn {

            top: 0;
            left: 0;

            z-index: 2000;
            justify-content: center;
            align-items: center;

        .auth-modal.active {

        }

            right: 20px;
            font-size: 20px;

            font-size: 18px;
            font-weight: 600;
            cursor: pointer;

        .auth-tab.active {
            color: #f97316;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 40px;
            color: #fff;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #f97316;
        }

        .auth-submit {
            width: 100%;
            padding: 12px;
            background: #f97316;
            border: none;
            border-radius: 40px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 15px 0;
        }

        .divider {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin: 15px 0;
        }

        .main-content {
            padding: 20px 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            padding: 5px 0;
        }

        .tab i {
            font-size: 18px;
        }

        .tab.active {
            color: #f97316;
            border-bottom: 2px solid #f97316;
        }

        /* Search */
        .search-box {
            position: relative;
            max-width: 500px;
            margin-bottom: 25px;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #f97316;
            font-size: 16px;
        }

            width: 100%;
            padding: 12px 20px 12px 45px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 40px;
            color: #fff;
            font-size: 15px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #f97316;
        }

            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            color: #888;
            font-size: 14px;
            flex-wrap: wrap;
        }

        .stats i {
            color: #f97316;
            margin-right: 5px;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
        }

        /* Card */
        .card {
            background: #141414;
            border-radius: 20px;
            border: 1px solid #2a2a2a;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .card:hover {
            border-color: #f97316;
            transform: translateY(-3px);
        }

        .card-header {
            height: 100px;
            background: #1f1f1f;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .card-header i {
            font-size: 40px;
            color: #f97316;
        }

        .card-header.emergency {
            background: #2d1a1a;
        }

        .card-header.emergency i {
            color: #ef4444;
        }

        .emergency-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .card-content {
            padding: 15px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        .card-category {
            font-size: 12px;
            color: #f97316;
            font-weight: 500;
            margin-bottom: 8px;
        }

            color: #aaa;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .detail-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            backdrop-filter: blur(8px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 15px;

        }

            background: #1a1a1a;

            overflow-y: auto;
            border-radius: 24px;
            padding: 25px;
            border: 1px solid #f97316;
            position: relative;
        }

        .close-detail {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 20px;
            color: #ef4444;
            cursor: pointer;
        }

            color: #f97316;
            text-align: center;
            margin-bottom: 15px;
        }

            font-weight: 800;
            color: #fff;
            text-align: center;
            margin-bottom: 5px;
        }

        .detail-category {
            text-align: center;
            color: #f97316;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 25px;
        }

        .detail-section {
            background: #242424;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 15px;
        }

            color: #f97316;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-section p {
            color: #ccc;
            font-size: 14px;
            line-height: 1.6;
        }

        .detail-section ul {
            list-style: none;
        }

        .detail-section li {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }

        .detail-section li::before {
            content: "•";
            color: #f97316;
            font-size: 18px;
            position: absolute;
            left: 0;
        }

        .warning-box {
            background: #2d1a1a;
            border: 1px solid #ef4444;
            border-radius: 16px;
            padding: 15px;
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .warning-box i {
            color: #ef4444;
            font-size: 20px;
        }

        .warning-box p {
            color: #ff9999;
            font-size: 13px;
        }

        /* Anatomy specific styles */
        .anatomy-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .body-diagram {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 30px 20px;
            border: 1px solid #333;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .body-silhouette {
            position: relative;
            width: 200px;
            height: 400px;
            background: #2a2a2a;
            border-radius: 100px 100px 30px 30px;
            border: 2px solid #f97316;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 30px 0;
        }

        .organ-marker {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #f97316;
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
            margin: 5px 0;
        }

        .organ-marker i {
            font-size: 24px;
            margin-bottom: 4px;
            filter: drop-shadow(0 0 5px #f97316);
        }

        .organ-marker:hover {
            transform: scale(1.2);
            color: #fff;
        }

        .organs-list {
            flex: 1;
            min-width: 250px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .organ-item {
            background: #242424;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .organ-item:hover {
            border-color: #f97316;
            background: #2a2a2a;
        }

        .organ-item i {
            font-size: 32px;
            color: #f97316;
            margin-bottom: 8px;
        }

        .organ-item span {
            display: block;
            font-size: 14px;
            font-weight: 600;
        }

        .welcome-message {
            background: #f97316;
            color: #000;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
        }

        footer {
            background: #111;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 13px;
            border-top: 1px solid #222;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            .navbar { padding: 10px 15px; }
            .logo h2 { font-size: 18px; }
            .main-content { padding: 15px; }
        }
    </style>
</head>

                { id: 1009, name: "Poisoning", category: "Emergency", steps: ["Identify poison", "Call poison control", "Do not induce vomiting unless told", "Follow instructions"], warning: "Bring sample to hospital", icon: "fa-skull" },
                { id: 1010, name: "Heat Stroke", category: "Emergency", steps: ["Move to cool place", "Remove excess clothing", "Cool with wet cloths", "Fan air"], warning: "Can be fatal if untreated", icon: "fa-temperature-high" },
                { id: 1011, name: "Hypothermia", category: "Emergency", steps: ["Move to warm place", "Remove wet clothes", "Warm gradually", "Give warm drinks if conscious"], warning: "Avoid direct heat", icon: "fa-snowflake" },
                { id: 1012, name: "Allergic Reaction", category: "Emergency", steps: ["Check for severe symptoms", "Use epinephrine if available", "Call emergency", "Loosen clothing"], warning: "Anaphylaxis can be fatal", icon: "fa-allergies" },
                { id: 1013, name: "Seizure", category: "Emergency", steps: ["Clear area of hard objects", "Do not restrain", "Time the seizure", "Turn on side after"], warning: "Call if lasts >5 minutes", icon: "fa-head-side-brain" },
                { id: 1014, name: "Diabetic Emergency", category: "Emergency", steps: ["Give sugar if conscious", "If unconscious, call emergency", "Monitor breathing", "Stay with person"], warning: "Can be low or high blood sugar", icon: "fa-sugar" },
                { id: 1015, name: "Nosebleed", category: "Minor", steps: ["Sit and lean forward", "Pinch nostrils for 10 min", "Apply cold compress", "Breathe through mouth"], warning: "Seek help if continues >20 min", icon: "fa-nose" },
                { id: 1016, name: "Snake Bite", category: "Emergency", steps: ["Keep calm", "Remove jewelry", "Keep bite below heart", "Call emergency"], warning: "Do not suck out venom", icon: "fa-snake" },
                { id: 1017, name: "Eye Injury", category: "Injury", steps: ["Do not rub eye", "Rinse gently with water", "Cover eye", "Seek medical help"], warning: "For chemicals, flush 15 min", icon: "fa-eye" }
            ],

            anatomy: [
                { id: 2001, name: "Heart", system: "Cardiovascular", description: "Pumps blood throughout the body. Located in the chest, slightly left.", function: "Circulates oxygen and nutrients, removes waste.", icon: "fa-heart", fact: "Beats about 100,000 times per day." },
                { id: 2002, name: "Lungs", system: "Respiratory", description: "Two spongy organs that exchange oxygen and carbon dioxide.", function: "Bring oxygen into blood and remove carbon dioxide.", icon: "fa-lungs", fact: "Right lung is slightly larger than left." },
                { id: 2003, name: "Brain", system: "Nervous", description: "Control center of the body, part of central nervous system.", function: "Processes thoughts, memory, emotions, and controls movements.", icon: "fa-brain", fact: "Contains about 86 billion neurons." },
                { id: 2004, name: "Stomach", system: "Digestive", description: "J-shaped organ that breaks down food with acid and enzymes.", function: "Digests food and sends it to small intestine.", icon: "fa-stomach", fact: "Can expand to hold up to 4 liters of food." },
                { id: 2005, name: "Liver", system: "Digestive", description: "Large organ in upper right abdomen.", function: "Filters blood, produces bile, stores energy.", icon: "fa-liver", fact: "Can regenerate itself." },
                { id: 2006, name: "Kidneys", system: "Urinary", description: "Two bean-shaped organs filtering blood.", function: "Remove waste and excess fluid, produce urine.", icon: "fa-kidneys", fact: "Filter about 150 liters of blood daily." },
                { id: 2007, name: "Intestines", system: "Digestive", description: "Small and large intestine extend from stomach.", function: "Absorb nutrients and water, form stool.", icon: "fa-intestines", fact: "Small intestine is about 6 meters long." },
                { id: 2008, name: "Bladder", system: "Urinary", description: "Hollow organ storing urine.", function: "Stores urine until urination.", icon: "fa-bladder", fact: "Can hold 400-600 ml of urine." }
            ]
        };

        // ==================== AUTH SYSTEM ====================
        let currentUser = null;

        const showLoginBtn = document.getElementById('showLoginBtn');
        const authModal = document.getElementById('authModal');
        const closeAuth = document.getElementById('closeAuth');
        const profileBtn = document.getElementById('profileBtn');
        const profileImage = document.getElementById('profileImage');
        const profileName = document.getElementById('profileName');
        const welcomeContainer = document.getElementById('welcomeContainer');

        showLoginBtn.addEventListener('click', () => authModal.classList.add('active'));
        closeAuth.addEventListener('click', () => authModal.classList.remove('active'));
        
        window.addEventListener('click', (e) => {
            if (e.target === authModal) authModal.classList.remove('active');
        });

        // Tab switching in auth
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
            });
        });

        // Manual login
        document.getElementById('manualLoginBtn').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value;
            if (email) {
                loginUser({
                    name: email.split('@')[0],
                    email: email,
                    picture: 'https://ui-avatars.com/api/?name=' + email.split('@')[0] + '&background=f97316&color=fff'
                });
            } else alert('Please enter email');
        });

        // Manual register
        document.getElementById('manualRegisterBtn').addEventListener('click', () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            if (name && email) {
                loginUser({
                    name: name,
                    email: email,
                    picture: 'https://ui-avatars.com/api/?name=' + name + '&background=f97316&color=fff'
                });
            } else alert('Please fill all fields');
        });

        function loginUser(user) {
            currentUser = user;
            showLoginBtn.style.display = 'none';
            profileBtn.style.display = 'flex';
            profileImage.src = user.picture;
            profileName.textContent = user.name.split(' ')[0];
            authModal.classList.remove('active');
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            // Show welcome message (without sending real email)
            welcomeContainer.innerHTML = `<div class="welcome-message"><i class="fas fa-envelope"></i> Welcome ${user.name}! (Welcome message displayed - no email sent)</div>`;
            setTimeout(() => welcomeContainer.innerHTML = '', 5000);
        }

        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            try { loginUser(JSON.parse(savedUser)); } catch (e) { localStorage.removeItem('currentUser'); }
        }

        profileBtn.addEventListener('click', () => {
            if (confirm('Logout?')) {
                currentUser = null;
                localStorage.removeItem('currentUser');
                showLoginBtn.style.display = 'flex';
                profileBtn.style.display = 'none';
                welcomeContainer.innerHTML = '';
            }
        });

        // Google Sign-In (simplified, using provided client ID)
        function decodeJwtResponse(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                return JSON.parse(atob(base64));
            } catch { return null; }
        }
        function handleGoogleSignIn(response) {
            const userData = decodeJwtResponse(response.credential);
            if (userData) {
                loginUser({
                    name: userData.name || 'User',
                    email: userData.email,
                    picture: userData.picture || 'https://ui-avatars.com/api/?name=' + (userData.name || 'User')
                });
            }
        }
        window.onload = function() {
            try {
                google.accounts.id.initialize({
                    client_id: "295699802302-q6mn9sldoki97gn2bai3sv54jjmiuf95.apps.googleusercontent.com",
                    callback: handleGoogleSignIn
                });
                google.accounts.id.renderButton(document.getElementById('googleSignInDiv'), { theme: 'outline', size: 'large', width: '100%' });
            } catch (e) { console.log('Google init error'); }
            displayCards(); // initial display
        };

        // ==================== DISPLAY SYSTEM ====================
        let currentTab = 'medicines';
        const cardsGrid = document.getElementById('cardsGrid');
        const searchInput = document.getElementById('searchInput');
        const searchBox = document.getElementById('searchBox');
        const anatomyContainer = document.getElementById('anatomyContainer');
        const detailModal = document.getElementById('detailModal');
        const detailContent = document.getElementById('detailContent');
        const closeDetail = document.getElementById('closeDetail');

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                searchInput.value = '';
                
                if (currentTab === 'anatomy') {
                    cardsGrid.style.display = 'none';
                    searchBox.style.display = 'none';
                    anatomyContainer.style.display = 'block';
                    renderAnatomy();
                } else {
                    cardsGrid.style.display = 'grid';
                    searchBox.style.display = 'block';
                    anatomyContainer.style.display = 'none';
                    displayCards();
                }
            });
        });

        function renderAnatomy() {
            let html = `
                <div class="anatomy-container">
                    <div class="body-diagram">
                        <div class="body-silhouette">
                            <div class="organ-marker" style="margin-top: 20px;" data-organ="brain"><i class="fas fa-brain"></i><span>Brain</span></div>
                            <div class="organ-marker" data-organ="lungs"><i class="fas fa-lungs"></i><span>Lungs</span></div>
                            <div class="organ-marker" data-organ="heart"><i class="fas fa-heart"></i><span>Heart</span></div>
                            <div class="organ-marker" data-organ="liver"><i class="fas fa-liver"></i><span>Liver</span></div>
                            <div class="organ-marker" data-organ="stomach"><i class="fas fa-stomach"></i><span>Stomach</span></div>
                            <div class="organ-marker" data-organ="kidneys"><i class="fas fa-kidneys"></i><span>Kidneys</span></div>
                            <div class="organ-marker" data-organ="intestines"><i class="fas fa-intestines"></i><span>Intestines</span></div>
                            <div class="organ-marker" data-organ="bladder"><i class="fas fa-bladder"></i><span>Bladder</span></div>
                        </div>
                        <div class="organs-list" id="organsList">
            `;
            database.anatomy.forEach(organ => {
                html += `<div class="organ-item" data-id="${organ.id}">
                    <i class="fas ${organ.icon}"></i>
                    <span>${organ.name}</span>
                    <small style="color:#f97316; display:block;">${organ.system}</small>
                </div>`;
            });
            html += `</div></div></div>`;

            anatomyContainer.innerHTML = html;

            // Add click listeners
            document.querySelectorAll('.organ-item, .organ-marker').forEach(el => {
                el.addEventListener('click', (e) => {
                    let organName = '';
                    if (el.classList.contains('organ-item')) {
                        const id = el.dataset.id;
                        const organ = database.anatomy.find(o => o.id == id);
                        if (organ) showAnatomyDetails(organ);
                    } else {
                        const name = el.dataset.organ;
                        const organ = database.anatomy.find(o => o.name.toLowerCase() === name.toLowerCase());
                        if (organ) showAnatomyDetails(organ);
                    }
                });
            });
        }

        function showAnatomyDetails(organ) {
            detailContent.innerHTML = `
                <div class="detail-icon"><i class="fas ${organ.icon}"></i></div>
                <div class="detail-name">${organ.name}</div>
                <div class="detail-category">${organ.system} System</div>
                <div class="detail-section"><h4><i class="fas fa-info-circle"></i> Description</h4><p>${organ.description}</p></div>
                <div class="detail-section"><h4><i class="fas fa-cogs"></i> Function</h4><p>${organ.function}</p></div>
                <div class="detail-section"><h4><i class="fas fa-lightbulb"></i> Did you know?</h4><p>${organ.fact}</p></div>
            `;
            detailModal.classList.add('active');
        }

        function displayCards(filter = '') {
            cardsGrid.innerHTML = '';
            let items = currentTab === 'medicines' ? database.medicines : database.firstAid;
            
            const filtered = items.filter(item => 
                item.name.toLowerCase().includes(filter.toLowerCase()) || 
                item.category.toLowerCase().includes(filter.toLowerCase())
            );

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                const isEmergency = currentTab === 'firstaid';
                const desc = currentTab === 'medicines' ? item.usage : item.steps[0];
                
                card.innerHTML = `
                    <div class="card-header ${isEmergency ? 'emergency' : ''}">
                        <i class="fas ${item.icon}"></i>
                        ${isEmergency ? '<span class="emergency-badge"><i class="fas fa-exclamation"></i> URGENT</span>' : ''}
                    </div>
                    <div class="card-content">
                        <div class="card-title">${item.name}</div>
                        <div class="card-category">${item.category}</div>
                        <div class="card-desc">${desc}</div>
                    </div>
                `;
                
                card.addEventListener('click', () => showDetails(item));
                cardsGrid.appendChild(card);
            });
        }

        function showDetails(item) {
            let html = `
                <div class="detail-icon"><i class="fas ${item.icon}"></i></div>
                <div class="detail-name">${item.name}</div>
                <div class="detail-category">${item.category}</div>
            `;

            if (currentTab === 'medicines') {
                html += `
                    <div class="detail-section"><h4><i class="fas fa-info-circle"></i> Uses</h4><p>${item.usage}</p></div>
                    <div class="detail-section"><h4><i class="fas fa-flask"></i> Mechanism</h4><p>${item.action}</p></div>
                    <div class="detail-section"><h4><i class="fas fa-clock"></i> Dosage</h4><p>${item.dosage}</p></div>
                    <div class="warning-box"><i class="fas fa-exclamation-triangle"></i><p><strong>⚠️ Warning:</strong> ${item.warnings}</p></div>
                `;
            } else {
                html += `
                    <div class="detail-section"><h4><i class="fas fa-list-ol"></i> Steps</h4><ul>${item.steps.map(step => `<li>${step}</li>`).join('')}</ul></div>
                    <div class="warning-box"><i class="fas fa-exclamation-triangle"></i><p><strong>⚠️ Important:</strong> ${item.warning}</p></div>
                `;
            }

            detailContent.innerHTML = html;
            detailModal.classList.add('active');
        }

        closeDetail.addEventListener('click', () => detailModal.classList.remove('active'));
        detailModal.addEventListener('click', (e) => {
            if (e.target === detailModal) detailModal.classList.remove('active');
        });

        searchInput.addEventListener('input', (e) => displayCards(e.target.value));
    </script>
</body>
</html>
