<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Stream Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS — لوحة "غرفة التحكم" (Broadcast Console)
   رمادي غرافيتي دافئ + كهرمان للبث المباشر (تالي) + تركواز للتفاعل
═══════════════════════════════════════════════ */
:root {
  --void:        #0c0c0e;
  --panel:       #15151a;
  --panel-2:     #1c1d23;
  --panel-3:     #25262e;
  --panel-4:     #313340;
  --line:        rgba(255,255,255,0.07);
  --line-2:      rgba(255,255,255,0.14);
  --ink-1:       #f1efe9;
  --ink-2:       #97948d;
  --ink-3:       #5c5a55;

  --signal:      #ff8a42;            /* كهرمان البث المباشر / تالي */
  --signal-dim:  rgba(255,138,66,0.16);
  --signal-glow: rgba(255,138,66,0.32);

  --cue:         #34c0ad;            /* تركواز التفاعل / التحديد */
  --cue-dim:     rgba(52,192,173,0.16);
  --cue-glow:    rgba(52,192,173,0.30);

  --danger:      #ef4444;
  --danger-dim:  rgba(239,68,68,0.16);
  --good:        #3bbf72;
  --good-dim:    rgba(59,191,114,0.16);

  --r-xs: 3px; --r-sm: 6px; --r-md: 9px; --r-lg: 14px; --r-round: 999px;
  --ease: cubic-bezier(.4,0,.2,1);
  --font:      'IBM Plex Sans Arabic', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, 'Courier New', monospace;
  --sidebar-w: 320px;
  --header-h: 60px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--font);
  background: var(--void);
  color: var(--ink-1);
  -webkit-font-smoothing: antialiased;
}

svg { display: block; }

button, input, select { font: inherit; color: inherit; }

:focus-visible {
  outline: 2px solid var(--cue);
  outline-offset: 2px;
  border-radius: var(--r-xs);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
}

/* ═══════════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════════ */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--panel-4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }
* { scrollbar-width: thin; scrollbar-color: var(--panel-4) transparent; }

/* ═══════════════════════════════════════════════
   HEADER — شريط التحكم العلوي
═══════════════════════════════════════════════ */
.header {
  height: var(--header-h);
  background: var(--panel);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 16px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
}

.logo {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  text-decoration: none;
}
.logo-mark {
  width: 32px; height: 32px;
  background: var(--panel-3);
  border: 1px solid var(--line-2);
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  color: var(--cue);
  flex-shrink: 0;
}
.logo-mark svg { width: 17px; height: 17px; }
.logo-name {
  font-size: 0.98rem; font-weight: 700; letter-spacing: -.2px;
  color: var(--ink-1);
  font-family: var(--font-mono);
}
.logo-tag {
  font-family: var(--font-mono);
  font-size: 0.6rem; font-weight: 600; letter-spacing: .9px;
  color: var(--cue);
  border: 1px solid var(--cue);
  padding: 2px 6px; border-radius: var(--r-xs);
  text-transform: uppercase;
}

/* URL bar */
.url-bar {
  flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0;
}
.url-field {
  flex: 1; position: relative; min-width: 0;
}
.url-field svg {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  color: var(--ink-3); pointer-events: none; flex-shrink: 0;
  width: 15px; height: 15px;
}
.url-input {
  width: 100%;
  background: var(--panel-2);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  color: var(--ink-1);
  font-family: var(--font-mono);
  font-size: 0.82rem;
  padding: 9px 38px 9px 12px;
  outline: none;
  transition: border-color .18s var(--ease), box-shadow .18s var(--ease);
  direction: ltr;
}
.url-input::placeholder { color: var(--ink-3); direction: rtl; font-family: var(--font); }
.url-input:focus {
  border-color: var(--cue);
  box-shadow: 0 0 0 3px var(--cue-dim);
}

/* buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 9px 16px;
  border: none; border-radius: var(--r-md);
  font-family: var(--font); font-size: 0.82rem; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: all .16s var(--ease);
  flex-shrink: 0;
}
.btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.btn-primary { background: var(--cue); color: #06201c; }
.btn-primary:hover { filter: brightness(1.08); box-shadow: 0 4px 18px var(--cue-glow); transform: translateY(-1px); }
.btn-primary:active { transform: none; box-shadow: none; }
.btn-ghost {
  background: var(--panel-2); color: var(--ink-2);
  border: 1px solid var(--line);
}
.btn-ghost:hover { background: var(--panel-3); color: var(--ink-1); border-color: var(--line-2); }
.btn-icon { padding: 9px 10px; }
.btn:disabled { opacity: .5; pointer-events: none; }

/* file input */
#fileInput { display: none; }

/* ═══════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════ */
.app {
  display: flex;
  height: calc(100vh - var(--header-h));
  margin-top: var(--header-h);
}

/* ═══════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  min-width: 240px;
  max-width: 440px;
  background: var(--panel);
  border-left: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
  position: relative;
}

/* sidebar top controls */
.sb-top {
  padding: 12px 12px 0;
  display: flex; flex-direction: column; gap: 8px;
  flex-shrink: 0;
}

/* search */
.search-wrap { position: relative; }
.search-wrap svg {
  position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
  color: var(--ink-3); pointer-events: none;
  width: 13px; height: 13px;
}
.search-input {
  width: 100%; background: var(--panel-2);
  border: 1px solid var(--line); border-radius: var(--r-sm);
  color: var(--ink-1); font-family: var(--font); font-size: 0.8rem;
  padding: 8px 34px 8px 10px; outline: none;
  transition: border-color .15s var(--ease);
}
.search-input:focus { border-color: var(--cue); }
.search-input::placeholder { color: var(--ink-3); }

/* group dropdown */
.group-select-wrap { position: relative; }
.group-select-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--ink-3); pointer-events: none;
  width: 12px; height: 12px;
}
.group-select {
  width: 100%; background: var(--panel-2);
  border: 1px solid var(--line); border-radius: var(--r-sm);
  color: var(--ink-1); font-family: var(--font); font-size: 0.78rem;
  padding: 7px 10px 7px 28px; outline: none;
  appearance: none; cursor: pointer;
  transition: border-color .15s var(--ease);
  direction: rtl;
}
.group-select:focus { border-color: var(--cue); }

/* view tabs */
.view-tabs {
  display: flex; gap: 4px;
  background: var(--panel-2);
  border-radius: var(--r-sm);
  padding: 3px;
  margin-bottom: 2px;
}
.view-tab {
  flex: 1; text-align: center;
  padding: 6px 8px; border-radius: var(--r-xs);
  font-size: 0.75rem; font-weight: 600; color: var(--ink-3);
  cursor: pointer; transition: all .15s var(--ease);
  border: none; background: none; font-family: var(--font);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.view-tab svg { width: 13px; height: 13px; }
.view-tab.active { background: var(--panel-4); color: var(--ink-1); }
.view-tab:hover:not(.active) { color: var(--ink-2); }

/* channel count */
.sb-meta {
  padding: 7px 12px;
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid var(--line);
  flex-shrink: 0;
}
.sb-meta-text { font-size: 0.7rem; color: var(--ink-3); }
.sb-meta-count {
  font-family: var(--font-mono);
  font-size: 0.7rem; font-weight: 600; color: var(--cue);
  background: var(--cue-dim); padding: 2px 8px; border-radius: var(--r-round);
  direction: ltr;
}

/* virtual grid container */
.vlist-wrap {
  flex: 1; overflow-y: auto; position: relative;
  padding: 10px;
}
.vlist-spacer { position: relative; width: 100%; }
.vlist-content {
  position: absolute; left: 0; right: 0; top: 0;
  display: grid;
}

/* ── Channel tile (square card) ── */
.tile {
  position: relative;
  aspect-ratio: 1 / 1;
  border-radius: var(--r-md);
  background: var(--panel-2);
  border: 1px solid var(--line);
  overflow: hidden;
  cursor: pointer;
  transition: transform .14s var(--ease), border-color .14s var(--ease), box-shadow .14s var(--ease);
}
.tile:hover {
  border-color: var(--line-2);
  transform: translateY(-2px);
  box-shadow: 0 10px 22px rgba(0,0,0,.4);
}
.tile.active {
  border-color: var(--signal);
  box-shadow: 0 0 0 1px var(--signal-dim), 0 10px 26px rgba(0,0,0,.45);
}

.tile-tally {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--signal); opacity: 0; transition: opacity .15s;
  z-index: 3;
}
.tile.active .tile-tally { opacity: 1; box-shadow: 0 0 8px var(--signal-glow); }

.tile-media {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(circle at 50% 38%, var(--panel-3) 0%, var(--panel-2) 72%);
}
.tile-logo {
  max-width: 60%; max-height: 52%;
  object-fit: contain;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,.45));
}
.tile-mono {
  width: 44%; aspect-ratio: 1; border-radius: 50%;
  background: var(--panel-4);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font); font-weight: 700; font-size: 1.3rem;
  color: var(--ink-2);
}

.tile-badge-num {
  position: absolute; top: 6px; inset-inline-start: 6px; z-index: 2;
  font-family: var(--font-mono); font-size: 0.6rem; color: var(--ink-2);
  background: rgba(12,12,14,.6); border: 1px solid var(--line);
  border-radius: var(--r-round); padding: 2px 6px;
  direction: ltr; backdrop-filter: blur(3px);
}

.tile-fav {
  position: absolute; top: 5px; inset-inline-end: 5px; z-index: 2;
  width: 25px; height: 25px; border-radius: 50%;
  background: rgba(12,12,14,.6); border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-3); cursor: pointer;
  backdrop-filter: blur(3px);
  transition: color .12s var(--ease), border-color .12s var(--ease), transform .12s var(--ease);
}
.tile-fav svg { width: 13px; height: 13px; }
.tile-fav:hover { transform: scale(1.1); color: var(--ink-1); }
.tile-fav.faved { color: var(--cue); border-color: var(--cue); }
.tile-fav.faved svg path { fill: currentColor; }

.tile-label {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 2;
  padding: 16px 8px 7px;
  background: linear-gradient(to top, rgba(10,10,12,.95) 10%, rgba(10,10,12,0));
}
.tile-name {
  font-size: 0.76rem; font-weight: 600; color: var(--ink-1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tile-group {
  font-size: 0.62rem; color: var(--ink-3); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* empty / loading states inside grid */
.grid-state {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; padding: 30px 20px; text-align: center;
}
.grid-state .state-icon { width: 38px; height: 38px; color: var(--ink-3); opacity: .55; }
.state-title { font-size: 0.85rem; color: var(--ink-2); font-weight: 600; }
.state-sub { font-size: 0.74rem; color: var(--ink-3); line-height: 1.6; max-width: 230px; }

/* resize handle */
.resize-handle {
  position: absolute; top: 0; right: -3px; bottom: 0; width: 6px;
  cursor: col-resize; z-index: 10;
}
.resize-handle::after {
  content: ''; position: absolute;
  top: 0; left: 2px; right: 2px; bottom: 0;
  background: transparent;
  transition: background .15s;
}
.resize-handle:hover::after,
.resize-handle.dragging::after {
  background: var(--cue);
}

/* ═══════════════════════════════════════════════
   MAIN PLAYER AREA
═══════════════════════════════════════════════ */
.main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: var(--void);
}

.player-zone {
  flex: 1; position: relative;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

/* idle screen */
.idle-screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px;
  background: var(--void);
}
.idle-icon-wrap {
  width: 64px; height: 64px; color: var(--ink-3);
  animation: float 4s ease-in-out infinite;
}
.idle-icon-wrap svg { width: 100%; height: 100%; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.idle-title { font-size: 1.25rem; font-weight: 700; color: var(--ink-2); }
.idle-sub { font-size: 0.82rem; color: var(--ink-3); text-align: center; max-width: 340px; line-height: 1.7; }
.idle-formats {
  font-family: var(--font-mono);
  font-size: 0.68rem; color: var(--ink-3); direction: ltr;
  background: var(--panel-2); border: 1px solid var(--line);
  padding: 5px 14px; border-radius: var(--r-round); letter-spacing: 1px;
}

/* video */
#vjsPlayer {
  width: 100%; height: 100%;
  display: none;
}
.video-js { background: #000 !important; width: 100% !important; height: 100% !important; }

/* on-air corner tally over the video */
.player-tally {
  position: absolute; top: 14px; inset-inline-start: 14px; z-index: 15;
  display: none; align-items: center; gap: 7px;
  background: rgba(12,12,14,.55); border: 1px solid var(--line-2);
  border-radius: var(--r-round); padding: 5px 11px;
  backdrop-filter: blur(5px);
}
.player-tally.show { display: flex; }
.player-tally-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--signal);
  box-shadow: 0 0 6px var(--signal-glow);
  animation: blink 1.6s ease-in-out infinite;
}
.player-tally span.lbl {
  font-family: var(--font-mono); font-size: 0.62rem; font-weight: 600;
  letter-spacing: 1px; color: var(--signal); direction: ltr;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* player loading overlay */
.player-loading {
  position: absolute; inset: 0; z-index: 20;
  display: none;
  flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  background: rgba(12,12,14,.85);
  backdrop-filter: blur(4px);
}
.player-loading.show { display: flex; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--line-2);
  border-top-color: var(--cue);
  border-radius: 50%;
  animation: spin .65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-text { font-size: 0.8rem; color: var(--ink-2); }

/* reconnect overlay */
.reconnect-overlay {
  position: absolute; inset: 0; z-index: 25;
  display: none;
  flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  background: rgba(12,12,14,.92);
}
.reconnect-overlay.show { display: flex; }
.reconnect-icon { width: 36px; height: 36px; color: var(--signal); animation: spin 1.1s linear infinite; }
.reconnect-icon svg { width: 100%; height: 100%; }
.reconnect-title { font-size: 1rem; font-weight: 700; color: var(--ink-1); }
.reconnect-sub { font-size: 0.8rem; color: var(--ink-3); }
.reconnect-progress {
  width: 200px; height: 3px;
  background: var(--panel-3); border-radius: 2px; overflow: hidden;
}
.reconnect-bar {
  height: 100%; background: var(--signal); border-radius: 2px;
  transition: width .1s linear;
}
.btn-cancel-rc {
  font-size: 0.78rem; padding: 7px 16px;
  background: var(--panel-3); color: var(--ink-2);
  border: 1px solid var(--line); border-radius: var(--r-sm);
  cursor: pointer; font-family: var(--font);
  transition: all .14s var(--ease);
}
.btn-cancel-rc:hover { color: var(--ink-1); background: var(--panel-4); }

/* custom controls bar */
.custom-controls {
  position: absolute; bottom: 54px; inset-inline-end: 16px;
  display: none;
  flex-direction: column; gap: 6px; z-index: 30;
}
.player-zone:hover .custom-controls { display: flex; }
.ctrl-btn {
  width: 34px; height: 34px;
  background: rgba(12,12,14,.78);
  border: 1px solid var(--line-2);
  border-radius: var(--r-sm);
  color: var(--ink-2);
  font-size: 11px; font-weight: 700; font-family: var(--font-mono);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .14s var(--ease);
  backdrop-filter: blur(4px);
}
.ctrl-btn svg { width: 15px; height: 15px; }
.ctrl-btn:hover { background: var(--panel-4); color: var(--ink-1); border-color: var(--cue); }

/* Video.js overrides */
.vjs-big-play-button {
  border: none !important; border-radius: 50% !important;
  width: 66px !important; height: 66px !important; line-height: 66px !important;
  background: rgba(52,192,173,.88) !important;
  top: 50% !important; left: 50% !important;
  transform: translate(-50%,-50%) !important;
  transition: transform .14s !important;
}
.vjs-big-play-button:hover { transform: translate(-50%,-50%) scale(1.08) !important; }
.vjs-control-bar {
  background: linear-gradient(transparent, rgba(0,0,0,.9)) !important;
  height: 44px !important;
}
.vjs-progress-control .vjs-play-progress { background: var(--cue) !important; }
.vjs-volume-level { background: var(--cue) !important; }

/* ═══════════════════════════════════════════════
   NOW PLAYING BAR
═══════════════════════════════════════════════ */
.np-bar {
  background: var(--panel);
  border-top: 1px solid var(--line);
  padding: 8px 18px;
  display: none;
  align-items: center; gap: 14px;
  min-height: 52px;
  flex-shrink: 0;
}
.np-bar.show { display: flex; }
.np-live {
  font-family: var(--font-mono);
  font-size: 0.64rem; font-weight: 600; letter-spacing: 1px;
  color: var(--signal); display: flex; align-items: center; gap: 6px;
  flex-shrink: 0; direction: ltr;
}
.np-live::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--signal); box-shadow: 0 0 6px var(--signal-glow);
  animation: blink 1.6s ease-in-out infinite;
}
.np-logo {
  width: 36px; height: 36px; border-radius: var(--r-sm);
  object-fit: contain; background: var(--panel-2);
  border: 1px solid var(--line); flex-shrink: 0;
  padding: 3px;
}
.np-info { flex: 1; min-width: 0; }
.np-name {
  font-size: 0.87rem; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.np-group { font-size: 0.72rem; color: var(--ink-3); margin-top: 1px; }
.np-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.np-time { font-family: var(--font-mono); font-size: 0.74rem; color: var(--ink-3); direction: ltr; }
.np-retry { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: var(--danger); }
.np-retry svg { width: 13px; height: 13px; }

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
.toaster {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 1000; display: flex; flex-direction: column; gap: 7px;
  pointer-events: none; align-items: center;
}
.toast {
  display: flex; align-items: center; gap: 9px;
  background: var(--panel-3);
  border: 1px solid var(--line-2);
  border-inline-start: 3px solid var(--ink-3);
  border-radius: var(--r-md);
  padding: 9px 16px;
  font-size: 0.81rem; color: var(--ink-1);
  box-shadow: 0 8px 36px rgba(0,0,0,.55);
  animation: t-in .22s var(--ease), t-out .22s var(--ease) 2.78s forwards;
  white-space: nowrap; max-width: 90vw;
}
.toast-icon { width: 15px; height: 15px; flex-shrink: 0; }
.toast.ok  { border-inline-start-color: var(--good); }
.toast.ok  .toast-icon { color: var(--good); }
.toast.err { border-inline-start-color: var(--danger); }
.toast.err .toast-icon { color: var(--danger); }
.toast.inf { border-inline-start-color: var(--cue); }
.toast.inf .toast-icon { color: var(--cue); }
@keyframes t-in  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
@keyframes t-out { to{opacity:0;transform:translateY(8px)} }

/* ═══════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════ */
@media (max-width: 680px) {
  .sidebar {
    position: fixed; top: var(--header-h); right: 0; bottom: 0;
    width: 100% !important; max-width: 100%;
    z-index: 150; transform: translateX(100%);
    transition: transform .22s var(--ease);
    border-left: none;
  }
  .sidebar.open { transform: translateX(0); }
  .app { flex-direction: column; }
  .logo-name,.logo-tag { display: none; }
  .btn span.label { display: none; }
  .btn { padding: 9px 10px; }
  #btnSidebar { display: inline-flex !important; }
}
@media (min-width: 681px) {
  #btnSidebar { display: none; }
}

/* ═══════════════════════════════════════════════
   PROGRESS BAR (top loading)
═══════════════════════════════════════════════ */
.page-progress {
  position: fixed; top: var(--header-h); left: 0; right: 0;
  height: 2px; z-index: 300;
  background: var(--cue);
  transform: scaleX(0); transform-origin: left;
  transition: transform .3s var(--ease), opacity .3s;
  opacity: 0;
}
.page-progress.loading { opacity: 1; transform: scaleX(.7); transition: transform 8s var(--ease), opacity .3s; }
.page-progress.done { opacity: 0; transform: scaleX(1); transition: transform .15s, opacity .4s .15s; }

<script id="workerSrc" type="text/plain">
self.onmessage = function(e) {
  const text = e.data;
  const lines = text.split(/\r?\n/);
  const channels = [];
  let pending = null;
  const total = lines.length;

  for (let i = 0; i < total; i++) {
    const line = lines[i].trim();
    if (!line) continue;

    if (line.startsWith('#EXTINF')) {
      const nameM = line.match(/,(.+)$/);
      const name  = nameM ? nameM[1].trim() : 'قناة';

      const logoM  = line.match(/tvg-logo="([^"]+)"/i);
      const groupM = line.match(/group-title="([^"]+)"/i);
      const idM    = line.match(/tvg-id="([^"]+)"/i);
      const countM = line.match(/tvg-country="([^"]+)"/i);

      pending = {
        name,
        logo:    logoM  ? logoM[1]  : '',
        group:   groupM ? groupM[1] : 'عام',
        tvgId:   idM    ? idM[1]    : '',
        country: countM ? countM[1] : '',
        url: ''
      };
    } else if (line.startsWith('#')) {
      // skip
    } else if (pending) {
      pending.url = line;
      channels.push(pending);
      pending = null;
    }

    if (i % 5000 === 0 && i > 0) {
      self.postMessage({ type: 'progress', pct: Math.round((i / total) * 100) });
    }
  }

  self.postMessage({ type: 'done', channels });
};
</script>

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
function toast(msg, type = 'inf', dur = 3000) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icon = type === 'ok' ? ICONS.check : type === 'err' ? ICONS.alert : ICONS.info;
  el.innerHTML = `<span class="toast-icon">${icon}</span><span>${esc(msg)}</span>`;
  toaster.appendChild(el);
  setTimeout(() => el.remove(), dur + 300);
}

/* ═══════════════════════════════════════════════

function progressStart() {

function progressDone() {
  pageProgress.className = 'page-progress done';
  setTimeout(() => pageProgress.className = 'page-progress', 500);

/* ═══════════════════════════════════════════════
   LOCALSTORAGE
═══════════════════════════════════════════════ */
function lsGet(k) { try { return localStorage.getItem(k); } catch { return null; } }
function lsSet(k, v) { try { localStorage.setItem(k, v); } catch {} }
function lsDel(k) { try { localStorage.removeItem(k); } catch {} }

function loadFavs() {
  try { favorites = new Set(JSON.parse(lsGet(LS.FAVS) || '[]')); }
  catch { favorites = new Set(); }
}
function saveFavs() {
  lsSet(LS.FAVS, JSON.stringify([...favorites]));
}

/* ═══════════════════════════════════════════════
   WEB WORKER PARSER
═══════════════════════════════════════════════ */
function parseWithWorker(text) {
  return new Promise((resolve, reject) => {
    const src = $('workerSrc').textContent;
    const blob = new Blob([src], { type: 'application/javascript' });
    const url  = URL.createObjectURL(blob);
    const w    = new Worker(url);

    w.onmessage = e => {
      if (e.data.type === 'progress') {
        playerLoadTxt.textContent = `جارٍ التحليل... ${e.data.pct}%`;
      } else if (e.data.type === 'done') {
        w.terminate(); URL.revokeObjectURL(url);
        resolve(e.data.channels);
      }
    };
    w.onerror = err => { w.terminate(); URL.revokeObjectURL(url); reject(err); };
    w.postMessage(text);
  });
}

/* ═══════════════════════════════════════════════
   FETCH M3U (with CORS fallback)
═══════════════════════════════════════════════ */
async function fetchM3U(url) {
  const proxies = [
    url,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
  ];
  for (const p of proxies) {
    try {
      const r = await fetch(p, { signal: AbortSignal.timeout(14000) });
      if (!r.ok) continue;
      const text = await r.text();
      if (text.includes('#EXTINF') || text.includes('#EXTM3U')) return text;
    } catch (_) {}
  }
  throw new Error('تعذّر الوصول إلى الرابط — تحقق منه أو جرّب ملفاً محلياً');
}

/* ═══════════════════════════════════════════════
   LOAD PIPELINE
═══════════════════════════════════════════════ */
async function loadFromText(text, label = '') {
  progressStart();
  showPlayerLoading(`جارٍ تحليل ${label}...`);

  try {
    const channels = await parseWithWorker(text);
    if (!channels.length) throw new Error('لم يُعثر على قنوات في الملف');

    channels.forEach((c, i) => c.__idx = i);
    allChannels = channels;
    buildGroups();
    rebuildDisplay();
    hidePlayerLoading();
    progressDone();
    toast(`تم تحميل ${channels.length.toLocaleString('en-US')} قناة`, 'ok');

    // Restore last channel
    const lastUrl = lsGet(LS.LAST);
    if (lastUrl) {
      const li = allChannels.findIndex(c => c.url === lastUrl);
      if (li !== -1) { setTimeout(() => playChannel(li), 400); }
    }
  } catch (err) {
    hidePlayerLoading();
    progressDone();
    toast(err.message, 'err', 5000);
  }
}

async function loadFromURL() {
  const url = urlInput.value.trim();
  if (!url) { toast('الرجاء إدخال رابط M3U', 'err'); return; }
  if (!url.startsWith('http')) { toast('الرابط يجب أن يبدأ بـ http أو https', 'err'); return; }

  lsSet(LS.URL, url);
  btnLoad.disabled = true;
  progressStart();
  showPlayerLoading('جارٍ تحميل الملف...');

  try {
    const text = await fetchM3U(url);
    btnLoad.disabled = false;
    await loadFromText(text, 'القائمة');
  } catch (err) {
    btnLoad.disabled = false;
    hidePlayerLoading();
    progressDone();
    toast(err.message, 'err', 5000);
  }
}

function loadFromFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => loadFromText(e.target.result, file.name);
  reader.onerror = () => toast('تعذّر قراءة الملف', 'err');
  reader.readAsText(file, 'UTF-8');
}

/* ═══════════════════════════════════════════════
   GROUPS
═══════════════════════════════════════════════ */
function buildGroups() {
  const groups = [...new Set(allChannels.map(c => c.group).filter(Boolean))].sort((a, b) =>
    a.localeCompare(b, 'ar')
  );
  groupSelect.innerHTML = '<option value="">— جميع المجموعات —</option>' +
    groups.map(g => `<option value="${esc(g)}">${esc(g)}</option>`).join('');
  groupWrap.style.display = groups.length ? '' : 'none';
}

/* ═══════════════════════════════════════════════
   GRID GEOMETRY
═══════════════════════════════════════════════ */
function computeGrid() {
  const w = vlistSpacer.clientWidth || vlistWrap.clientWidth - 20;
  cols  = Math.max(2, Math.floor((w + GAP) / (MIN_TILE + GAP)));
  tileW = Math.floor((w - GAP * (cols - 1)) / cols);
  rowH  = tileW + GAP;
  vlistContent.style.gridTemplateColumns = `repeat(${cols}, ${tileW}px)`;
  vlistContent.style.gap = GAP + 'px';
}

function chNum(n, total) {
  const width = Math.max(2, String(total).length);
  return String(n).padStart(width, '0');
}

function firstChar(name) {
  const t = (name || '').trim();
  return t ? t.charAt(0).toUpperCase() : '#';
}

/* ═══════════════════════════════════════════════
   DISPLAY LIST + VIRTUAL GRID SCROLL
═══════════════════════════════════════════════ */
function rebuildDisplay() {
  computeGrid();

  const q = searchQ.toLowerCase();
  const isFav = activeTab === 'fav';

  displayList = allChannels.filter(c => {
    if (isFav && !favorites.has(c.url)) return false;
    if (activeGroup && c.group !== activeGroup) return false;
    if (q && !c.name.toLowerCase().includes(q) && !c.group.toLowerCase().includes(q)) return false;
    return true;
  });

  const n = displayList.length;
  const totalRows = Math.max(1, Math.ceil(n / cols));
  vlistSpacer.style.height = (totalRows * rowH) + 'px';
  sbMetaCount.textContent  = String(n);
  sbMetaText.textContent   = isFav ? 'المفضلة' : (activeGroup || 'جميع القنوات');

  toggleGridState(n === 0, isFav);

  lastScrollTop = -1;
  renderVisible();
}

function toggleGridState(empty, isFav) {
  gridState.style.display = empty ? 'flex' : 'none';
  if (!empty) return;
  if (allChannels.length === 0) {
    gridStateTitle.textContent = 'لا توجد قنوات';
    gridStateSub.textContent   = 'أدخل رابط M3U من الأعلى لعرض القنوات هنا.';
  } else if (isFav) {
    gridStateTitle.textContent = 'لا قنوات مفضّلة';
    gridStateSub.textContent   = 'اضغط على أيقونة النجمة في أي قناة لإضافتها هنا.';
  } else {
    gridStateTitle.textContent = 'لا نتائج مطابقة';
    gridStateSub.textContent   = 'جرّب كلمة بحث مختلفة أو غيّر المجموعة المحددة.';
  }
}

let lastScrollTop = -1;
function renderVisible() {
  const st    = vlistWrap.scrollTop;
  if (Math.abs(st - lastScrollTop) < 2 && lastScrollTop !== -1) return;
  lastScrollTop = st;

  const viewH     = vlistWrap.clientHeight;
  const total     = displayList.length;
  const totalRows = Math.max(1, Math.ceil(total / cols));
  const startRow  = Math.max(0, Math.floor(st / rowH) - 2);
  const endRow    = Math.min(totalRows - 1, Math.ceil((st + viewH) / rowH) + 2);

  vlistContent.style.top = (startRow * rowH) + 'px';

  const frag = document.createDocumentFragment();
  for (let r = startRow; r <= endRow; r++) {
    for (let c = 0; c < cols; c++) {
      const pos = r * cols + c;
      if (pos >= total) continue;
      const ch = displayList[pos];
      frag.appendChild(buildTile(ch, ch.__idx, pos));
    }
  }
  vlistContent.innerHTML = '';
  vlistContent.appendChild(frag);
}

function buildTile(ch, idx, pos) {
  const div = document.createElement('div');
  div.className = 'tile' + (idx === activeIdx ? ' active' : '');
  div.dataset.idx = idx;
  div.tabIndex = 0;
  div.setAttribute('role', 'button');
  div.setAttribute('aria-label', ch.name);

  const isFav = favorites.has(ch.url);
  const num = chNum(pos + 1, displayList.length);

  div.innerHTML = `
    <div class="tile-tally"></div>
    <div class="tile-media">
      ${ch.logo
        ? `<img class="tile-logo" data-fallback="${esc(ch.name)}" src="${esc(ch.logo)}" alt="" loading="lazy">`
        : `<div class="tile-mono">${esc(firstChar(ch.name))}</div>`}
    </div>
    <div class="tile-badge-num">${num}</div>
    <button class="tile-fav${isFav ? ' faved' : ''}" data-url="${esc(ch.url)}" aria-label="${isFav ? 'إزالة من المفضلة' : 'إضافة للمفضلة'}">${ICONS.star}</button>
    <div class="tile-label">
      <div class="tile-name">${esc(ch.name)}</div>
      <div class="tile-group">${esc(ch.group)}</div>
    </div>`;

  const img = div.querySelector('.tile-logo');
  if (img) {
    img.addEventListener('error', () => {
      const mono = document.createElement('div');
      mono.className = 'tile-mono';
      mono.textContent = firstChar(img.dataset.fallback);
      img.replaceWith(mono);
    }, { once: true });
  }

  div.addEventListener('click', e => {
    if (e.target.closest('.tile-fav')) return;
    playChannel(idx);
    if (window.innerWidth <= 680) sidebar.classList.remove('open');
  });
  div.addEventListener('keydown', e => {
    if ((e.key === 'Enter' || e.key === ' ') && !e.target.closest('.tile-fav')) {
      e.preventDefault();
      playChannel(idx);
    }
  });

  div.querySelector('.tile-fav').addEventListener('click', e => {
    e.stopPropagation();
    toggleFav(ch.url, e.currentTarget);
  });

  return div;
}

function toggleFav(url, btn) {
  if (favorites.has(url)) {
    favorites.delete(url);
    btn.classList.remove('faved');
    btn.setAttribute('aria-label', 'إضافة للمفضلة');
  } else {
    favorites.add(url);
    btn.classList.add('faved');
    btn.setAttribute('aria-label', 'إزالة من المفضلة');
  }
  saveFavs();
  if (activeTab === 'fav') rebuildDisplay();
}

/* ═══════════════════════════════════════════════
   VIDEO PLAYER (Video.js + HLS.js)
═══════════════════════════════════════════════ */
function initPlayer() {
  if (player) return;
  vjsEl.style.display = 'block';
  player = videojs('vjsPlayer', {
    controls: true, autoplay: true, preload: 'auto',
    fluid: false, fill: true, techOrder: ['html5'],
    html5: { vhs: { overrideNative: !videojs.browser.IS_SAFARI } },
    controlBar: {
      pictureInPictureToggle: false,
      fullscreenToggle: false,
    }
  });

  player.on('error', () => onStreamError());
  player.on('playing', () => {
    isStreamLoaded = true; // تم تشغيل البث بنجاح، نمنع ظهور النافذة مجدداً عند التقطيع البسيط
    hidePlayerLoading();
    cancelReconnect();
    npRetry.style.display = 'none';
  });
  player.on('waiting', () => {
    // تظهر النافذة فقط عند الانتقال لقناة جديدة لأول مرة، ولا تظهر عند التقطيع المؤقت
    if (activeIdx >= 0 && !isStreamLoaded) {
      showPlayerLoading('جارٍ تحميل البث...');
    }
  });
  player.on('canplay', hidePlayerLoading);
}

function guessType(url) {
  if (!url) return 'application/x-mpegURL';
  const u = url.toLowerCase().split('?')[0];
  if (u.endsWith('.m3u8') || u.includes('m3u8')) return 'application/x-mpegURL';
  if (u.endsWith('.ts'))  return 'video/mp2t';
  if (u.endsWith('.mp4')) return 'video/mp4';
  if (u.endsWith('.mkv')) return 'video/x-matroska';
  return 'application/x-mpegURL';
}

function playChannel(idx) {
  const ch = allChannels[idx];
  if (!ch) return;

  cancelReconnect();
  activeIdx = idx;
  isStreamLoaded = false; // إعادة ضبط الحالة عند الانتقال لقناة جديدة
  lsSet(LS.LAST, ch.url);

  idleScreen.style.display = 'none';
  initPlayer();

  showPlayerLoading('جارٍ الاتصال...');

  // Destroy previous HLS instance
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

  let src = ch.url;
  // Mixed content proxy for HTTP streams on HTTPS page
  if (location.protocol === 'https:' && src.startsWith('http://')) {
    src = `https://corsproxy.io/?${encodeURIComponent(src)}`;
  }

  const type = guessType(ch.url);

  // Use HLS.js directly for better compatibility
  if (type === 'application/x-mpegURL' && Hls.isSupported()) {
    hlsInstance = new Hls({
      enableWorker: true,
      lowLatencyMode: false, // إيقاف وضع زمن الاستجابة المنخفض لزيادة استقرار التخزين المؤقت
      backBufferLength: 60,  // زيادة حجم التخزين الخلفي
      maxBufferLength: 30,   // زيادة التخزين المؤقت لـ 30 ثانية لتفادي التقطيع الناتج عن الإنترنت
      maxMaxBufferLength: 60,
    });
    hlsInstance.loadSource(src);
    hlsInstance.attachMedia(vjsEl);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
      vjsEl.play().catch(() => {});
      hidePlayerLoading();
    });
    hlsInstance.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) onStreamError();
    });
  } else {
    player.src({ src, type });
    player.play().catch(() => {});
  }

  // Update Now Playing bar
  npBar.classList.add('show');
  playerTally.classList.add('show');
  npName.textContent  = ch.name;
  npGroup.textContent = ch.group;
  npLogo.style.display = ch.logo ? '' : 'none';
  npLogo.src = ch.logo || '';

  if (timeTimer) clearInterval(timeTimer);
  updateTime(); timeTimer = setInterval(updateTime, 1000);

  renderVisible(); // refresh active state
}

function updateTime() {
  npTime.textContent = new Date().toLocaleTimeString('en-GB', {
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}

/* ═══════════════════════════════════════════════
   AUTO-RECONNECT
═══════════════════════════════════════════════ */
function onStreamError() {
  if (reconnectCount >= RECONNECT_MAX) {
    cancelReconnect();
    toast('فشل الاتصال بعد ' + RECONNECT_MAX + ' محاولات — تأكد من الرابط', 'err', 6000);
    npRetry.style.display = 'flex';
    npRetryText.textContent = 'فشل الاتصال';
    return;
  }
  reconnectCount++;
  reconnectCancel = false;
  reconnectOv.classList.add('show');
  reconnectSub.textContent = `إعادة الاتصال... المحاولة ${reconnectCount} من ${RECONNECT_MAX}`;
  npRetry.style.display = 'flex';
  npRetryText.textContent = `محاولة ${reconnectCount}/${RECONNECT_MAX}`;

  let elapsed = 0;
  reconnectBar.style.width = '0%';
  const step = 100 / (RECONNECT_INT / 100);

  reconnectTimer = setInterval(() => {
    if (reconnectCancel) return;
    elapsed += step;
    reconnectBar.style.width = Math.min(100, elapsed) + '%';
    if (elapsed >= 100) {
      clearInterval(reconnectTimer);
      reconnectOv.classList.remove('show');
      if (!reconnectCancel) playChannel(activeIdx);
    }
  }, 100);
}

function cancelReconnect() {
  reconnectCancel = true;
  reconnectCount  = 0;
  if (reconnectTimer) { clearInterval(reconnectTimer); reconnectTimer = null; }
  reconnectOv.classList.remove('show');
}

/* ═══════════════════════════════════════════════
   PLAYER LOADING UI
═══════════════════════════════════════════════ */
function showPlayerLoading(msg = '') {
  if (msg) playerLoadTxt.textContent = msg;
  playerLoading.classList.add('show');
}
function hidePlayerLoading() {
  playerLoading.classList.remove('show');
}

/* ═══════════════════════════════════════════════
   ASPECT RATIO & FULLSCREEN
═══════════════════════════════════════════════ */
btnAR.addEventListener('click', () => {
  arCurrent = (arCurrent + 1) % arModes.length;
  const ar = arModes[arCurrent];
  playerZone.dataset.ar = ar;
  btnAR.textContent = ar;
});

btnFS.addEventListener('click', () => {
  const el = playerZone;
  if (!document.fullscreenElement) { el.requestFullscreen?.(); }
  else { document.exitFullscreen?.(); }
});

/* ═══════════════════════════════════════════════
   SEARCH (DEBOUNCED)
═══════════════════════════════════════════════ */
searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    searchQ = searchInput.value.trim();
    rebuildDisplay();
  }, 180);
});

/* ═══════════════════════════════════════════════
   GROUP FILTER
═══════════════════════════════════════════════ */
groupSelect.addEventListener('change', () => {
  activeGroup = groupSelect.value;
  rebuildDisplay();
});

/* ═══════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════ */
[tabAll, tabFav].forEach(tab => {
  tab.addEventListener('click', () => {
    activeTab = tab.dataset.tab;
    tabAll.classList.toggle('active', activeTab === 'all');
    tabFav.classList.toggle('active', activeTab === 'fav');
    rebuildDisplay();
  });
});

/* ═══════════════════════════════════════════════
   VIRTUAL SCROLL
═══════════════════════════════════════════════ */
vlistWrap.addEventListener('scroll', () => {
  if (scrollRAF) cancelAnimationFrame(scrollRAF);
  scrollRAF = requestAnimationFrame(renderVisible);
});

/* ═══════════════════════════════════════════════
   GRID RESPONSIVENESS (sidebar resize, window resize, mobile toggle)
═══════════════════════════════════════════════ */
let gridRAF = null;
function scheduleGridUpdate() {
  if (gridRAF) cancelAnimationFrame(gridRAF);
  gridRAF = requestAnimationFrame(rebuildDisplay);
}
if (window.ResizeObserver) {
  const ro = new ResizeObserver(() => scheduleGridUpdate());
  ro.observe(vlistWrap);
}
window.addEventListener('resize', scheduleGridUpdate);

/* ═══════════════════════════════════════════════
   SIDEBAR RESIZE
═══════════════════════════════════════════════ */
(function setupResize() {
  const handle = $('resizeHandle');
  let dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; startW = sidebar.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = startX - e.clientX;
    const w = Math.min(440, Math.max(240, startW + delta));
    sidebar.style.width = w + 'px';
    lsSet(LS.SBAR, w);
    scheduleGridUpdate();
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  // restore width
  const saved = lsGet(LS.SBAR);
  if (saved) sidebar.style.width = saved + 'px';
})();

/* ═══════════════════════════════════════════════
   MOBILE SIDEBAR
═══════════════════════════════════════════════ */
btnSidebar.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  scheduleGridUpdate();
});

/* ═══════════════════════════════════════════════
   LOAD BUTTON / FILE INPUT
═══════════════════════════════════════════════ */
btnLoad.addEventListener('click', loadFromURL);
urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadFromURL(); });
btnFile.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { loadFromFile(e.target.files[0]); fileInput.value = ''; });
btnCancelRC.addEventListener('click', cancelReconnect);

/* ═══════════════════════════════════════════════
   KEYBOARD SHORTCUTS
═══════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowDown') { e.preventDefault(); playChannel(activeIdx + 1); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); playChannel(activeIdx - 1); }
  if (e.key === 'f' || e.key === 'F') btnFS.click();
  if (e.key === '/') { e.preventDefault(); searchInput.focus(); }
});

/* ═══════════════════════════════════════════════
   ESCAPE — close mobile sidebar
═══════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') sidebar.classList.remove('open');
});

/* ═══════════════════════════════════════════════
   HELPER: escape HTML
═══════════════════════════════════════════════ */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════
   INIT — restore session
═══════════════════════════════════════════════ */
(function init() {
  loadFavs();
  computeGrid();
  toggleGridState(true, false);
  const savedUrl = lsGet(LS.URL);
  if (savedUrl) {
    urlInput.value = savedUrl;
    toast('جارٍ استعادة آخر جلسة...', 'inf', 2000);
    setTimeout(loadFromURL, 600);
  }
})();
</script>
